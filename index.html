<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>PickUpTheHitch</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div class="css-spinner"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="loading-text">Загрузка...</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      // Динамическая проверка наличия фоновой текстуры Background.png в TemplateData
      var bgImg = new Image();
      bgImg.src = 'TemplateData/Background.png';
      bgImg.onload = function() {
        document.body.style.backgroundImage = "url('TemplateData/Background.png')";
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
      };

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Dumatik_Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/Dumatik_Build.data.unityweb",
        frameworkUrl: buildUrl + "/Dumatik_Build.framework.js.unityweb",
        codeUrl: buildUrl + "/Dumatik_Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "PickUpTheHitch",
        productVersion: "1.0",
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
